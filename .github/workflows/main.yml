name: Kutno monitor

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repo
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalacja
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Przegladarka
        run: |
          python -m playwright install chromium

      - name: Uruchom
        run: |
          python main.py

      - name: Zapisz wynik
        uses: actions/upload-artifact@v4
        with:
          name: raport
          path: data/reports/
